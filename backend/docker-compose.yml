version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      # Bind only to localhost (127.0.0.1) so Nginx can access it,
      # but it is NOT open to the public internet directly.
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secretpassword}
      POSTGRES_DB: ${DB_NAME:-kheladekho}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      # Only expose to other containers in the same network (not the host)
      - "5432"

volumes:
  postgres_data:
